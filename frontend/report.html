<!DOCTYPE html>
<html lang="en" class="bg-slate-950 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BriefBot — Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .loader-lg{width:40px;height:40px;border:4px solid #4f46e5;border-bottom-color:transparent;border-radius:50%;display:inline-block;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* markdown prose */
    .prose h1,.prose h2,.prose h3{color:#e2e8f0;margin-top:1.5em;margin-bottom:.5em}
    .prose h1{font-size:1.5rem;font-weight:800}
    .prose h2{font-size:1.25rem;font-weight:700;border-bottom:1px solid #334155;padding-bottom:.3em}
    .prose h3{font-size:1.1rem;font-weight:600}
    .prose p{margin:.5em 0;color:#cbd5e1;line-height:1.7}
    .prose ul,.prose ol{margin:.5em 0 .5em 1.5em;color:#cbd5e1}
    .prose li{margin:.25em 0}
    .prose strong{color:#f1f5f9}
    .prose table{width:100%;border-collapse:collapse;margin:1em 0;font-size:.9rem}
    .prose th{text-align:left;padding:.5em;background:#1e293b;color:#94a3b8;border-bottom:1px solid #334155}
    .prose td{padding:.5em;border-bottom:1px solid #1e293b;color:#cbd5e1}
    .prose code{background:#1e293b;padding:.15em .4em;border-radius:4px;font-size:.9em}
    .prose blockquote{border-left:3px solid #4f46e5;padding-left:1em;color:#94a3b8;margin:1em 0}
    .prose a{color:#818cf8;text-decoration:underline}
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="border-b border-slate-800 px-6 py-4 flex items-center justify-between">
    <a href="/" class="text-xl font-bold tracking-tight">
      <span class="text-indigo-400">Brief</span>Bot
    </a>
    <div class="flex gap-4 text-sm">
      <a href="/" class="text-slate-400 hover:text-white transition">&larr; New Briefing</a>
      <a href="/dashboard" class="text-slate-400 hover:text-white transition">Dashboard</a>
    </div>
  </nav>

  <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-8">

    <!-- Status bar -->
    <div id="statusBar" class="mb-6 bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-center gap-4">
      <div id="statusIcon" class="loader-lg"></div>
      <div>
        <div id="statusTitle" class="font-semibold text-lg">Generating briefing…</div>
        <div id="statusSub" class="text-sm text-slate-400">Your agent is gathering intelligence from 6 sources. This takes ~30 seconds.</div>
      </div>
    </div>

    <!-- Meta card (shown when complete) -->
    <div id="metaCard" class="hidden mb-6 bg-slate-900 border border-slate-800 rounded-xl p-4 grid grid-cols-2 sm:grid-cols-4 gap-4 text-center text-sm">
      <div>
        <div class="text-slate-500">Company</div>
        <div id="metaCompany" class="font-semibold text-white">—</div>
      </div>
      <div>
        <div class="text-slate-500">Domain</div>
        <div id="metaDomain" class="font-semibold text-indigo-400">—</div>
      </div>
      <div>
        <div class="text-slate-500">API Cost</div>
        <div id="metaCost" class="font-semibold text-emerald-400">—</div>
      </div>
      <div>
        <div class="text-slate-500">Status</div>
        <div id="metaStatus" class="font-semibold">—</div>
      </div>
    </div>

    <!-- Pipeline stages -->
    <div id="stages" class="mb-6 bg-slate-900 border border-slate-800 rounded-xl p-4">
      <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Agent Pipeline</div>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-7 gap-2 text-xs text-center">
        <div class="stage-pill bg-slate-800 rounded-lg py-2 px-1" id="s-apollo">Apollo</div>
        <div class="stage-pill bg-slate-800 rounded-lg py-2 px-1" id="s-hunter">Hunter</div>
        <div class="stage-pill bg-slate-800 rounded-lg py-2 px-1" id="s-builtwith">BuiltWith</div>
        <div class="stage-pill bg-slate-800 rounded-lg py-2 px-1" id="s-firecrawl">Firecrawl</div>
        <div class="stage-pill bg-slate-800 rounded-lg py-2 px-1" id="s-tavily">Tavily</div>
        <div class="stage-pill bg-slate-800 rounded-lg py-2 px-1" id="s-openai">OpenAI</div>
        <div class="stage-pill bg-slate-800 rounded-lg py-2 px-1" id="s-done">Done</div>
      </div>
    </div>

    <!-- Report content -->
    <div id="reportContent" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-10 prose">
    </div>

    <!-- Error -->
    <div id="errorBlock" class="hidden bg-red-900/30 border border-red-800 rounded-xl p-6 text-center">
      <div class="text-red-400 font-semibold text-lg mb-2">Generation Failed</div>
      <div id="errorText" class="text-red-300 text-sm"></div>
      <a href="/" class="inline-block mt-4 text-sm text-indigo-400 hover:underline">&larr; Try again</a>
    </div>
  </main>

  <footer class="border-t border-slate-800 px-6 py-4 text-center text-xs text-slate-500">
    Payments powered by <a href="https://beta.paywithlocus.com" target="_blank" class="text-indigo-400 hover:underline">Locus</a>
  </footer>

  <script>
    const orderId = window.location.pathname.split('/').pop();
    let pollTimer = null;

    async function loadOrder() {
      try {
        const res = await fetch(`/api/orders/${orderId}`);
        if (!res.ok) throw new Error('Order not found');
        const o = await res.json();
        render(o);

        if (o.status === 'PROCESSING') {
          pollTimer = setTimeout(loadOrder, 2500);
        }
      } catch (e) {
        showError(e.message);
      }
    }

    function render(o) {
      // meta
      document.getElementById('metaCompany').textContent = o.company_name;
      document.getElementById('metaDomain').textContent  = o.company_domain || '—';
      document.getElementById('metaCost').textContent     = '$' + (o.total_cost || 0).toFixed(4);

      if (o.status === 'COMPLETED') {
        clearTimeout(pollTimer);
        document.getElementById('statusBar').classList.add('hidden');
        document.getElementById('metaCard').classList.remove('hidden');
        document.getElementById('metaStatus').textContent = 'COMPLETED';
        document.getElementById('metaStatus').className = 'font-semibold text-emerald-400';

        // light up all stages
        document.querySelectorAll('.stage-pill').forEach(el => {
          el.classList.remove('bg-slate-800');
          el.classList.add('bg-emerald-600/30', 'text-emerald-300');
        });

        // render report markdown
        const rc = document.getElementById('reportContent');
        rc.innerHTML = marked.parse(o.report || '*No report content.*');
        rc.classList.remove('hidden');

      } else if (o.status === 'FAILED') {
        clearTimeout(pollTimer);
        showError(o.error || 'Unknown error');

      } else {
        // still processing — animate stages based on cost_breakdown
        document.getElementById('statusBar').classList.remove('hidden');
        const breakdown = JSON.parse(o.cost_breakdown || '{}');
        const stageMap = {
          'apollo_org': 's-apollo', 'apollo_people': 's-apollo',
          'hunter': 's-hunter', 'builtwith': 's-builtwith',
          'firecrawl': 's-firecrawl', 'tavily': 's-tavily',
          'openai': 's-openai',
        };
        for (const key of Object.keys(breakdown)) {
          const el = document.getElementById(stageMap[key]);
          if (el) {
            el.classList.remove('bg-slate-800');
            el.classList.add('bg-indigo-600/30', 'text-indigo-300');
          }
        }
      }
    }

    function showError(msg) {
      document.getElementById('statusBar').classList.add('hidden');
      document.getElementById('errorBlock').classList.remove('hidden');
      document.getElementById('errorText').textContent = msg;
    }

    loadOrder();
  </script>
</body>
</html>
